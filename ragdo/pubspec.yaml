name: jawabdo
description: Jawab Do - Hyderabad Civic Issues App. Jawab Do GHMC ko!
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_messaging: ^16.1.3

  # Backend
  supabase_flutter: ^2.3.0

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Media
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0
  cached_network_image: ^3.3.1

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # UI
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  timeago: ^3.6.0
  visibility_detector: ^0.4.0+2
  shimmer: ^3.0.0

  # Utilities
  share_plus: ^7.2.2
  url_launcher: ^6.2.4
  intl: ^0.18.1
  uuid: ^4.3.3
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
